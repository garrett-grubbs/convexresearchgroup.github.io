<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convex Admin</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: Georgia, serif;
    background: #0F1A2E;
    color: #F8F5EF;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .container {
    width: 100%;
    max-width: 600px;
  }
  .logo {
    text-align: center;
    margin-bottom: 40px;
  }
  .logo h1 {
    font-size: 20px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #C9A84C;
  }
  .logo p {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    margin-top: 6px;
    letter-spacing: 0.05em;
  }
  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 4px;
    padding: 40px;
  }
  .field {
    margin-bottom: 24px;
  }
  label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-bottom: 8px;
  }
  input, select, textarea {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 3px;
    color: #F8F5EF;
    font-family: Georgia, serif;
    font-size: 15px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus, select:focus, textarea:focus {
    border-color: #C9A84C;
  }
  select option { background: #1B2A4A; }
  textarea { resize: vertical; min-height: 80px; }
  .btn {
    width: 100%;
    background: #C9A84C;
    color: #0F1A2E;
    border: none;
    border-radius: 3px;
    font-family: Georgia, serif;
    font-size: 13px;
    font-weight: bold;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 14px;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 8px;
  }
  .btn:hover { background: #e0c06a; }
  .btn:disabled { background: rgba(201,168,76,0.4); cursor: not-allowed; }
  .msg {
    text-align: center;
    font-size: 14px;
    margin-top: 16px;
    min-height: 20px;
    color: #C9A84C;
  }
  .divider {
    border: none;
    border-top: 1px solid rgba(255,255,255,0.1);
    margin: 32px 0;
  }
  .section-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-bottom: 20px;
  }
  #login-section { display: block; }
  #admin-section { display: none; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <h1>Convex Research Group</h1>
    <p>Admin Panel</p>
  </div>

  <!-- LOGIN -->
  <div class="card" id="login-section">
    <div class="field">
      <label>Password</label>
      <input type="password" id="pwd" placeholder="Enter password" onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn" onclick="login()">Sign In</button>
    <div class="msg" id="login-msg"></div>
  </div>

  <!-- ADMIN -->
  <div id="admin-section">
    <div class="card">
      <div class="section-label">Add Research Publication</div>

      <div class="row">
        <div class="field">
          <label>Date</label>
          <input type="text" id="date" placeholder="Jun 16, 2026">
        </div>
        <div class="field">
          <label>Type</label>
          <select id="type">
            <option value="morning-note">Morning Note</option>
            <option value="trade-idea">Trade Idea</option>
            <option value="deep-dive">Deep Dive</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label>Title</label>
        <input type="text" id="title" placeholder="Morning Note — June 16, 2026">
      </div>

      <div class="field">
        <label>Summary (1-2 sentences)</label>
        <textarea id="summary" placeholder="Fed holds, rates rally, HY spreads tighten heading into FOMC."></textarea>
      </div>

      <div class="row">
        <div class="field">
          <label>Tag</label>
          <select id="tag">
            <option value="Macro">Macro</option>
            <option value="Rates">Rates</option>
            <option value="Equities">Equities</option>
            <option value="Credit">Credit</option>
            <option value="IPO">IPO</option>
          </select>
        </div>
        <div class="field">
          <label>PDF filename (in notes/)</label>
          <input type="text" id="href" placeholder="2026-06-16-morning-note.pdf">
        </div>
      </div>

      <button class="btn" id="submit-btn" onclick="submitNote()">Add to Site</button>
      <div class="msg" id="submit-msg"></div>
    </div>

    <hr class="divider">

    <div class="card">
      <div class="section-label">Current Publications</div>
      <div id="current-list" style="font-size:14px; color: rgba(255,255,255,0.6); line-height:1.8;">Loading...</div>
    </div>
  </div>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw15mqBN5mHqQhZtS1gxvj_tfQl7FBkTEOSn8U5ox_LGQHJ25YqeqZjtQjxZRZLtmE/exec';
  const PASSWORD = 'Brotherhood23!';

  const TYPE_LABELS = {
    'morning-note': 'Morning Note',
    'trade-idea': 'Trade Idea',
    'deep-dive': 'Deep Dive'
  };

  function login() {
    const pwd = document.getElementById('pwd').value;
    if (pwd === PASSWORD) {
      document.getElementById('login-section').style.display = 'none';
      document.getElementById('admin-section').style.display = 'block';
      loadNotes();
    } else {
      document.getElementById('login-msg').textContent = 'Incorrect password.';
    }
  }

  function submitNote() {
    const date = document.getElementById('date').value.trim();
    const type = document.getElementById('type').value;
    const title = document.getElementById('title').value.trim();
    const summary = document.getElementById('summary').value.trim();
    const tag = document.getElementById('tag').value;
    const href = document.getElementById('href').value.trim();

    if (!date || !title || !summary || !href) {
      document.getElementById('submit-msg').textContent = 'Please fill in all fields.';
      return;
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Adding...';
    document.getElementById('submit-msg').textContent = '';

    const typeLabel = TYPE_LABELS[type];
    const body = `action=addNote&date=${encodeURIComponent(date)}&type=${encodeURIComponent(type)}&typeLabel=${encodeURIComponent(typeLabel)}&title=${encodeURIComponent(title)}&summary=${encodeURIComponent(summary)}&tag=${encodeURIComponent(tag)}&href=${encodeURIComponent('notes/' + href)}`;

    fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: body
    })
    .then(() => {
      document.getElementById('submit-msg').textContent = 'Added! Upload the PDF to notes/ on GitHub.';
      btn.disabled = false;
      btn.textContent = 'Add to Site';
      // Clear fields
      document.getElementById('date').value = '';
      document.getElementById('title').value = '';
      document.getElementById('summary').value = '';
      document.getElementById('href').value = '';
      setTimeout(loadNotes, 1500);
    })
    .catch(() => {
      document.getElementById('submit-msg').textContent = 'Error. Try again.';
      btn.disabled = false;
      btn.textContent = 'Add to Site';
    });
  }

  function loadNotes() {
    fetch(SCRIPT_URL + '?action=getNotes')
    .then(r => r.json())
    .then(data => {
      const list = document.getElementById('current-list');
      if (!data || data.length === 0) {
        list.textContent = 'No publications yet.';
        return;
      }
      list.innerHTML = data.map(n =>
        `<div style="padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.07);">
          <span style="color:#C9A84C">${n.date}</span> &mdash; ${n.title}
        </div>`
      ).join('');
    })
    .catch(() => {
      document.getElementById('current-list').textContent = 'Could not load publications.';
    });
  }
</script>
</body>
</html>
